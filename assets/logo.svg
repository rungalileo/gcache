<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">GCache logo</title>
  <desc id="desc">A glowing electric blue G and E monogram on a dark gray background.</desc>
  <defs>
