        stroke-width="2"
      />
      <polygon points="592,474 645,439 842,476 688,507" fill="url(#blue)" stroke="#0044d4" stroke-width="2" />
      <polygon points="634,522 886,489 886,533 689,576 634,573" fill="url(#blue)" stroke="#0044d4" stroke-width="2" />
      <polygon points="634,588 886,548 886,590 634,666" fill="url(#blue)" stroke="#0044d4" stroke-width="2" />
      <path d="M634 522 L634 666" fill="none" stroke="#0044d4" stroke-width="2" />
